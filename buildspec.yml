version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 772928963091.dkr.ecr.ap-southeast-2.amazonaws.com/2048-game-repo
  build:
    commands:
      - echo Building the Docker image...
      - docker build -t 2048-game .
      - echo Tagging the Docker image...
      - docker tag 2048-game:latest 772928963091.dkr.ecr.ap-southeast-2.amazonaws.com/2048-game-repo:latest
  post_build:
    commands:
      - echo Pushing the Docker image to Amazon ECR...
      - docker push <your-ecr-repository-uri>:latest
      - echo Creating imagedefinitions.json file for ECS deployment...
      - echo '[{"name":"2048-container","imageUri":"772928963091.dkr.ecr.ap-southeast-2.amazonaws.com/2048-game-repo/2048-game-repo:latest"}]' > imagedefinitions.json
​
artifacts:
  files:
    - imagedefinitions.json
​